<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elephant Walk - Order Now</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        height: 100%;
        background: #070707;
        font-family: "DM Sans", sans-serif;
        overflow: hidden;
      }

      .chownow-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: #111;
        border-bottom: 1px solid rgba(201,168,76,0.25);
        height: 50px;
      }

      .chownow-topbar .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #c9a84c;
        text-decoration: none;
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .chownow-topbar .back-btn:hover {
        color: #e0ba5c;
      }

      .chownow-topbar .title {
        font-size: 1.5rem;
        color: #fff;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .chownow-frame {
        width: 100%;
        height: calc(100vh - 50px);
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="chownow-topbar">
      <a href="javascript:history.back()" class="back-btn">&#8592; Back</a>
      <span class="title">Order Online</span>
      <span style="width:60px"></span>
    </div>

    <iframe
      class="chownow-frame"
      src="https://order.chownow.com/order/4290/locations"
      title="ChowNow Online Ordering"
      allow="fullscreen; payment; geolocation; camera; microphone"
      allowpaymentrequest
      allowfullscreen
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <script>
      // If ChowNow tries to open a new tab or navigate window.top,
      // intercept and redirect the current page instead
      var iframe = document.querySelector('.chownow-frame');
      iframe.addEventListener('load', function () {
        try {
          var iframeWin = iframe.contentWindow;
          var origOpen = iframeWin.open;
          iframeWin.open = function (url) {
            if (url) window.location.href = url;
            return null;
          };
        } catch (e) {
          // Cross-origin restriction — fallback: listen for message events
        }
      });

      // Listen for postMessage from ChowNow to detect redirect requests
      window.addEventListener('message', function (e) {
        if (e.data && typeof e.data === 'string' && e.data.startsWith('http')) {
          window.location.href = e.data;
        }
        if (e.data && e.data.url) {
          window.location.href = e.data.url;
        }
      });
    </script>
  </body>
</html>
