<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elephant Walk – Order Now</title>
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml" />
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: Arial, sans-serif;
      }

      .topbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 48px;
        background: #111;
        border-bottom: 1px solid rgba(201, 168, 76, 0.35);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        z-index: 10;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #c9a84c;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: 0.3px;
      }

      .topbar-title {
        font-size: 14px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .order-frame {
        position: fixed;
        top: 48px;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: calc(100% - 48px);
        border: none;
      }
    </style>
  </head>
  <body>

    <div class="topbar">
      <a class="back-btn" href="javascript:history.back()">&#8592; Back</a>
      <span class="topbar-title">Order Online</span>
      <span style="width:60px"></span>
    </div>

    <iframe
      class="order-frame"
      src="https://order.chownow.com/order/4290/locations"
      title="ChowNow Online Ordering"
      allow="payment; fullscreen; geolocation; camera; microphone"
      allowpaymentrequest
      allowfullscreen
    ></iframe>

  </body>
</html>
